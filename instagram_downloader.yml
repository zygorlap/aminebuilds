name: Instagram Public Archiver

on:
  workflow_dispatch:
    inputs:
      target_username:
        description: "Public Instagram username (without @)"
        required: true
        type: string
      max_posts:
        description: "Max posts to download (0 = ALL)"
        required: false
        default: "0"
        type: string

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install apify-client requests

      - name: Run archiver
        id: archiver
        env:
          TARGET: ${{ github.event.inputs.target_username }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: python archiver.py

      - name: Commit and push
        run: |
          git config user.name "Instagram Archiver Bot"
          git config user.email "actions@github.com"
          git add instagram_archive/
          if git diff --quiet --cached; then
            echo "Nothing new to commit."
          else
            git commit -m "archive(@${{ github.event.inputs.target_username }}): $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ github.event.inputs.target_username }}-${{ github.run_id }}
          path: instagram_archive/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## Instagram Archive — @${{ github.event.inputs.target_username }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Posts processed | ${{ steps.archiver.outputs.posts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files saved | ${{ steps.archiver.outputs.files_saved }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ${{ steps.archiver.outputs.errors }} |" >> $GITHUB_STEP_SUMMARY
