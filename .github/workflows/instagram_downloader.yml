name: Instagram Scraper - Public Sources Only

on:
  workflow_dispatch:
    inputs:
      profile_link:
        description: 'Public profile URL'
        required: true
        type: string
      max_items:
        description: 'Max items (0 = all)'
        default: '0'
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: 1

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          pip install -q yt-dlp requests beautifulsoup4

      - name: Setup
        run: |
          url="${{ inputs.profile_link }}"
          clean=$(echo "$url" | sed -E 's/[?#].*//; s/\/$//')
          username=$(basename "$clean")
          echo "USERNAME=$username" >> $GITHUB_ENV
          echo "MAX_ITEMS=${{ inputs.max_items }}" >> $GITHUB_ENV
          mkdir -p "$username/posts" "$username/reels"

      - name: Extract shortcodes from public sources
        run: |
          USERNAME="${{ env.USERNAME }}"
          CODES_FILE="shortcodes.txt"
          > "$CODES_FILE"

          python3 << 'PYEOF'
          import urllib.request, urllib.parse, re, json, sys, os
          from html.parser import HTMLParser

          username = os.environ.get('USERNAME', '')
          if not username:
              sys.exit(1)

          all_codes = set()
          hdr = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'}

          def fetch(url, timeout=15):
              try:
                  req = urllib.request.Request(url, headers=hdr)
                  return urllib.request.urlopen(req, timeout=timeout).read().decode('utf-8', errors='replace')
              except:
                  return None

          def extract_codes(text, prefix=r'(?:p|reel)'):
              return set(re.findall(rf'instagram\.com/{prefix}/([A-Za-z0-9_-]{{11,}})', text or ''))

          # SOURCE 1: SocialBlade (public Instagram stats page - sometimes has links)
          print("[1/6] SocialBlade...")
          html = fetch(f'https://socialblade.com/instagram/user/{username}')
          if html:
              codes = extract_codes(html)
              all_codes.update(codes)
              print(f"  -> {len(codes)} codes")

          # SOURCE 2: Dumpor (public Instagram viewer - sometimes works)
          print("[2/6] Dumpor...")
          html = fetch(f'https://dumpor.com/v/{username}')
          if html:
              codes = extract_codes(html)
              all_codes.update(codes)
              print(f"  -> {len(codes)} codes")

          # SOURCE 3: Imginn (public Instagram viewer)
          print("[3/6] Imginn...")
          html = fetch(f'https://imginn.com/{username}/')
          if html:
              codes = extract_codes(html)
              all_codes.update(codes)
              print(f"  -> {len(codes)} codes")

          # SOURCE 4: Bibliogram (open source Instagram front-end)
          print("[4/6] Bibliogram...")
          for instance in ['https://bibliogram.art/u/{u}', 'https://bibliogram.snopyta.org/u/{u}', 'https://bibliogram.pussthecat.org/u/{u}']:
              html = fetch(instance.format(u=username))
              if html:
                  codes = extract_codes(html)
                  all_codes.update(codes)
                  if codes:
                      print(f"  -> {len(codes)} codes from {instance.split('/')[2]}")
                      break

          # SOURCE 5: Google Images search
          print("[5/6] Google Images...")
          q = urllib.parse.quote(f'instagram {username}')
          html = fetch(f'https://www.google.com/search?q={q}&tbm=isch')
          if html:
              # Google Images embed URLs that point to Instagram
              codes = set(re.findall(r'instagram\.com/(?:p|reel)/([A-Za-z0-9_-]{11,})', html))
              all_codes.update(codes)
              print(f"  -> {len(codes)} codes")

          # SOURCE 6: Try yt-dlp with --extractor-args
          print("[6/6] yt-dlp with mobile extractor...")
          import subprocess
          for ua in [
              'Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X)',
              'Mozilla/5.0 (Linux; Android 14)',
          ]:
              try:
                  result = subprocess.run([
                      'yt-dlp', '--flat-playlist', '--dump-json',
                      '--no-warnings', '--ignore-errors',
                      '--extractor-args', 'instagram:web_search=google',
                      '--user-agent', ua,
                      f'https://www.instagram.com/{username}/'
                  ], capture_output=True, text=True, timeout=30)
                  if result.stdout:
                      for line in result.stdout.strip().split('\n'):
                          if not line: continue
                          try:
                              d = json.loads(line)
                              c = d.get('id') or d.get('shortcode')
                              if c: all_codes.add(c)
                          except: pass
                      print(f"  -> {len(all_codes)} total after yt-dlp")
                      break
              except:
                  continue

          final = sorted(all_codes)
          print(f"\nTOTAL: {len(final)} shortcodes")
          for c in final:
              print(c)

          PYEOF > "$CODES_FILE"

          # But stdout went to file, let me fix that...
          python3 << 'PYEOF2' > "$CODES_FILE"
          import urllib.request, urllib.parse, re, json, sys, os, subprocess

          username = os.environ.get('USERNAME', '')
          if not username:
              sys.exit(1)

          all_codes = set()
          hdr = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}

          def fetch(url, timeout=12):
              try:
                  req = urllib.request.Request(url, headers=hdr)
                  return urllib.request.urlopen(req, timeout=timeout).read().decode('utf-8', errors='replace')
              except:
                  return None

          def extract_codes(text, prefix=r'(?:p|reel)'):
              return set(re.findall(rf'instagram\.com/{prefix}/([A-Za-z0-9_-]{{11,}})', text or ''))

          # Sources
          sources = [
              ('SocialBlade', f'https://socialblade.com/instagram/user/{username}'),
              ('Imginn', f'https://imginn.com/{username}/'),
              ('Dumpor', f'https://dumpor.com/v/{username}'),
          ]
          for name, url in sources:
              html = fetch(url)
              if html:
                  codes = extract_codes(html)
                  all_codes.update(codes)

          # Bibliogram instances
          for inst in ['bibliogram.art', 'bibliogram.snopyta.org', 'bibliogram.pussthecat.org']:
              html = fetch(f'https://{inst}/u/{username}')
              if html:
                  codes = extract_codes(html)
                  all_codes.update(codes)
                  if codes:
                      break

          # Google search
          q = urllib.parse.quote(f'instagram.com/{username}')
          html = fetch(f'https://www.google.com/search?q={q}&num=100')
          if html:
              all_codes.update(extract_codes(html))

          # yt-dlp
          try:
              result = subprocess.run([
                  'yt-dlp', '--flat-playlist', '--dump-json',
                  '--no-warnings', '--ignore-errors',
                  '--extractor-args', 'instagram:web_search=google',
                  '--user-agent', 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_4 like Mac OS X)',
                  f'https://www.instagram.com/{username}/'
              ], capture_output=True, text=True, timeout=30)
              if result.stdout:
                  for line in result.stdout.strip().split('\n'):
                      if not line: continue
                      try:
                          d = json.loads(line)
                          c = d.get('id') or d.get('shortcode')
                          if c: all_codes.add(c)
                      except: pass
          except:
              pass

          for c in sorted(all_codes):
              print(c)

          PYEOF2

      - name: Check results
        run: |
          if [ ! -s "shortcodes.txt" ]; then
            echo "No shortcodes found for ${{ env.USERNAME }}"
            echo ""
            echo "This account is fully locked behind Instagram's login wall."
            echo "No public tool can scrape it without credentials."
            echo ""
            echo "To download @${{ env.USERNAME }} content, you MUST:"
            echo "1. Go to: Settings > Secrets and variables > Actions"
            echo "2. Add Variable: INSTA_USERNAME = your_instagram_username"
            echo "3. Add Secret: INSTA_PASSWORD = your_instagram_password"
            echo ""
            echo "Or try this tool on a different public account."
            exit 0
          fi
          echo "Found $(wc -l < shortcodes.txt) shortcodes"

      - name: Download media
        if: hashFiles('shortcodes.txt') != ''
        run: |
          USERNAME="${{ env.USERNAME }}"
          if [ ! -s "shortcodes.txt" ]; then exit 0; fi
          
          TOTAL=$(wc -l < "shortcodes.txt")
          SUCCESS=0
          FAIL=0
          COUNT=0
          
          while IFS= read -r CODE; do
            [ -z "$CODE" ] && continue
            COUNT=$((COUNT+1))
            printf "[%d/%d] %s " "$COUNT" "$TOTAL" "$CODE"
            
            if yt-dlp --quiet --no-warnings --restrict-filenames \
              --output "$USERNAME/posts/%(upload_date)s_%(id)s.%(ext)s" \
              --download-archive "$USERNAME/archive.txt" \
              --merge-output-format mp4 \
              --no-overwrites --continue \
              --retries 5 \
              "https://www.instagram.com/p/$CODE/" 2>/dev/null; then
              SUCCESS=$((SUCCESS+1)); echo "OK"
            elif yt-dlp --quiet --no-warnings --restrict-filenames \
              --output "$USERNAME/reels/%(upload_date)s_%(id)s.%(ext)s" \
              --download-archive "$USERNAME/archive.txt" \
              --merge-output-format mp4 \
              --no-overwrites --continue \
              --retries 5 \
              "https://www.instagram.com/reel/$CODE/" 2>/dev/null; then
              SUCCESS=$((SUCCESS+1)); echo "OK"
            else
              FAIL=$((FAIL+1)); echo "FAIL"
            fi
            sleep 2
          done < "shortcodes.txt"
          
          echo "Done: $SUCCESS OK, $FAIL failed"

      - name: Push
        if: always()
        run: |
          USERNAME="${{ env.USERNAME }}"
          if [ ! -d "$USERNAME" ]; then exit 0; fi
          
          POST_COUNT=$(find "$USERNAME/posts" -type f 2>/dev/null | wc -l)
          REEL_COUNT=$(find "$USERNAME/reels" -type f 2>/dev/null | wc -l)
          TOTAL_SIZE=$(find "$USERNAME" -type f ! -name "archive.txt" ! -name "download_report.json" -exec stat --format='%s' {} + 2>/dev/null | awk '{s+=$1} END {printf "%.2f", s/1024/1024}')
          
          jq -n --arg u "$USERNAME" --arg d "$(date -u +%Y-%m-%dT%H:%M:%SZ)" --argjson p "${POST_COUNT:-0}" --argjson r "${REEL_COUNT:-0}" --argjson t "$((POST_COUNT + REEL_COUNT))" --argjson s "${TOTAL_SIZE:-0}" '{username: $u, date: $d, posts_downloaded: $p, reels_downloaded: $r, total_items: $t, total_size_mb: $s}' > "$USERNAME/download_report.json"
          
          git config user.name "IG-Bot"
          git config user.email "bot@localhost"
          git add "$USERNAME/posts/" "$USERNAME/reels/" "$USERNAME/download_report.json"
          git reset -- "$USERNAME/archive.txt" 2>/dev/null || true
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "Media: @$USERNAME $(date +%Y-%m-%d)"
            git push origin HEAD
          fi
