name: 🚀 Instagram Premium Bulk Downloader v4

on:
  workflow_dispatch:
    inputs:
      profile_link:
        description: 'Public profile URL (e.g., https://www.instagram.com/akvenice_sw/)'
        required: true
        type: string
      max_items:
        description: 'Max items to download (0 = all)'
        default: '0'
        required: false
        type: string

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: 1

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ffmpeg python3-pip python3-venv
          python3 -m venv /opt/ig-env
          source /opt/ig-env/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install yt-dlp requests instaloader

      - name: Extract username
        run: |
          url="${{ inputs.profile_link }}"
          clean=$(echo "$url" | sed -E 's/[?#].*//; s/\/$//')
          username=$(basename "$clean")
          echo "USERNAME=$username" >> $GITHUB_ENV
          echo "MAX_ITEMS=${{ inputs.max_items }}" >> $GITHUB_ENV
          mkdir -p "$username/posts" "$username/reels"

      - name: Instagram login
        run: |
          source /opt/ig-env/bin/activate
          if [ -n "${{ vars.INSTA_USERNAME }}" ] && [ -n "${{ secrets.INSTA_PASSWORD }}" ]; then
            instaloader --login "${{ vars.INSTA_USERNAME }}" --password "${{ secrets.INSTA_PASSWORD }}" --no-pictures --no-videos --count 1 --quiet "${{ vars.INSTA_USERNAME }}" 2>&1 || echo "Login attempted"
            echo "LOGIN=yes" >> $GITHUB_ENV
          else
            echo "LOGIN=no" >> $GITHUB_ENV
            echo "No credentials. Set INSTA_USERNAME (var) and INSTA_PASSWORD (secret) for better results."
          fi

      - name: Extract shortcodes
        run: |
          source /opt/ig-env/bin/activate
          USERNAME="${{ env.USERNAME }}"
          MAX_ITEMS="${{ env.MAX_ITEMS }}"
          LOGIN="${{ env.LOGIN }}"
          CODES_FILE="shortcodes.txt"
          > "$CODES_FILE"

          echo "[Harvest] Target: @$USERNAME"

          # --- Method 1: yt-dlp flat playlist ---
          echo ""
          echo "=== Method 1: yt-dlp ==="
          YT_OPTS="--flat-playlist --dump-json --no-warnings --ignore-errors"
          if [ "$MAX_ITEMS" != "0" ]; then
            YT_OPTS="$YT_OPTS --playlist-end $MAX_ITEMS"
          fi
          yt-dlp $YT_OPTS "https://www.instagram.com/$USERNAME/" 2>/dev/null | python3 -c "
import sys, json
for line in sys.stdin:
    line = line.strip()
    if not line: continue
    try:
        d = json.loads(line)
        c = d.get('id') or d.get('shortcode')
        if c: print(c)
    except: pass
" >> "$CODES_FILE" 2>/dev/null
          echo "yt-dlp done: $(wc -l < $CODES_FILE) codes so far"

          # --- Method 2: Instaloader ---
          echo ""
          echo "=== Method 2: Instaloader ==="
          INSTA_OPTS="--no-pictures --no-videos --no-metadata-json --no-compress-json --quiet"
          if [ "$MAX_ITEMS" != "0" ]; then
            INSTA_OPTS="$INSTA_OPTS --count $MAX_ITEMS"
          fi
          if [ "$LOGIN" = "yes" ]; then
            instaloader $INSTA_OPTS --dirname-pattern="/tmp/insta_${USERNAME}" "$USERNAME" 2>/dev/null || true
          else
            instaloader $INSTA_OPTS --dirname-pattern="/tmp/insta_${USERNAME}" "$USERNAME" 2>/dev/null || true
          fi
          find /tmp/insta_${USERNAME} -name "*.json" -exec cat {} \; 2>/dev/null | python3 -c "
import sys, json, re
for line in sys.stdin:
    for match in re.finditer(r'[A-Za-z0-9_-]{11,}', line):
        print(match.group(0))
" >> "$CODES_FILE" 2>/dev/null || true
          rm -rf /tmp/insta_${USERNAME} 2>/dev/null || true
          echo "Instaloader done: $(wc -l < $CODES_FILE) codes so far"

          # --- Method 3: Direct HTTP ---
          echo ""
          echo "=== Method 3: Direct HTTP ==="
          python3 -c "
import urllib.request, re, json, sys, os
username = os.environ.get('USERNAME', '')
if not username: sys.exit(1)
url = f'https://www.instagram.com/{username}/'
req = urllib.request.Request(url, headers={
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
    'Accept': 'text/html',
})
try:
    resp = urllib.request.urlopen(req, timeout=15)
    text = resp.read().decode('utf-8', errors='replace')
    codes = re.findall(r'instagram\.com/(?:p|reel)/([A-Za-z0-9_-]{11,})', text)
    for c in sorted(set(codes)):
        print(c)
except Exception as e:
    sys.exit(1)
" >> "$CODES_FILE" 2>/dev/null || true
          echo "Direct HTTP done: $(wc -l < $CODES_FILE) codes so far"

          # --- Deduplicate ---
          sort -u -o "$CODES_FILE" "$CODES_FILE"
          TOTAL=$(wc -l < "$CODES_FILE")
          echo ""
          echo "=========================================="
          echo "TOTAL SHORTCODES: $TOTAL"
          echo "=========================================="
          if [ "$TOTAL" -eq 0 ]; then
            echo ""
            echo "No shortcodes found. Instagram requires authentication."
            echo "To fix: add INSTA_USERNAME as repo variable and INSTA_PASSWORD as repo secret."
            echo "Go to: Settings > Secrets and variables > Actions"
          fi

      - name: Download media
        run: |
          source /opt/ig-env/bin/activate
          USERNAME="${{ env.USERNAME }}"
          MAX_ITEMS="${{ env.MAX_ITEMS }}"
          CODES_FILE="shortcodes.txt"

          if [ ! -s "$CODES_FILE" ]; then
            echo "No shortcodes to download."
            exit 0
          fi

          TOTAL=$(wc -l < "$CODES_FILE")
          SUCCESS=0
          FAIL=0
          COUNT=0

          echo ""
          echo "Downloading $TOTAL items for @$USERNAME"
          echo ""

          while IFS= read -r CODE; do
            [ -z "$CODE" ] && continue
            COUNT=$((COUNT+1))
            printf "[%d/%d] %s " "$COUNT" "$TOTAL" "$CODE"

            # Try as post first
            if yt-dlp --quiet --no-warnings --restrict-filenames \
              --output "$USERNAME/posts/%(upload_date)s_%(id)s.%(ext)s" \
              --download-archive "$USERNAME/archive.txt" \
              --merge-output-format mp4 \
              --no-overwrites --continue \
              --retries 5 --fragment-retries 5 \
              "https://www.instagram.com/p/$CODE/" 2>/dev/null; then
              SUCCESS=$((SUCCESS+1))
              echo "OK"
            # Try as reel
            elif yt-dlp --quiet --no-warnings --restrict-filenames \
              --output "$USERNAME/reels/%(upload_date)s_%(id)s.%(ext)s" \
              --download-archive "$USERNAME/archive.txt" \
              --merge-output-format mp4 \
              --no-overwrites --continue \
              --retries 5 --fragment-retries 5 \
              "https://www.instagram.com/reel/$CODE/" 2>/dev/null; then
              SUCCESS=$((SUCCESS+1))
              echo "OK (reel)"
            else
              FAIL=$((FAIL+1))
              echo "FAIL"
            fi

            sleep $((RANDOM % 5 + 2))
          done < "$CODES_FILE"

          echo ""
          echo "Success: $SUCCESS | Failed: $FAIL"

      - name: Generate report
        run: |
          USERNAME="${{ env.USERNAME }}"
          if [ ! -d "$USERNAME" ]; then exit 0; fi

          POST_COUNT=$(find "$USERNAME/posts" -type f 2>/dev/null | wc -l)
          REEL_COUNT=$(find "$USERNAME/reels" -type f 2>/dev/null | wc -l)
          TOTAL_SIZE=$(find "$USERNAME" -type f -not -name "archive.txt" -not -name "download_report.json" -exec stat --format='%s' {} + 2>/dev/null | awk '{s+=$1} END {printf "%.2f", s/1024/1024}')
          TOTAL_ITEMS=$((POST_COUNT + REEL_COUNT))

          cat > "$USERNAME/download_report.json" << EOF
          {
            "username": "$USERNAME",
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "posts_downloaded": ${POST_COUNT:-0},
            "reels_downloaded": ${REEL_COUNT:-0},
            "total_items": ${TOTAL_ITEMS:-0},
            "total_size_mb": ${TOTAL_SIZE:-0}
          }
          EOF

          echo ""
          echo "=========================================="
          echo "FINAL REPORT"
          echo "=========================================="
          cat "$USERNAME/download_report.json"
          echo ""

      - name: Commit and push
        if: always()
        run: |
          USERNAME="${{ env.USERNAME }}"
          if [ ! -d "$USERNAME" ]; then exit 0; fi

          git config user.name "IG-Bot"
          git config user.email "bot@localhost"
          git add "$USERNAME/posts/" "$USERNAME/reels/" "$USERNAME/download_report.json"
          git reset -- "$USERNAME/archive.txt" 2>/dev/null || true

          if git diff-index --quiet HEAD; then
            echo "No new files."
          else
            git commit -m "Media update: @$USERNAME $(date +%Y-%m-%d)"
            git push origin HEAD
            echo "Pushed successfully!"
          fi
