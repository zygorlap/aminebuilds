name: Bulk Download Instagram Content

on:
  # Allows you to manually trigger this run from the Actions tab
  workflow_dispatch:
    inputs:
      target_username:
        description: 'The Instagram username to download (Public profiles only)'
        required: true
        type: string
      download_reels:
        description: 'Download Reels/IGTV as well?'
        required: true
        type: boolean
        default: true

jobs:
  download-instagram:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    # Step 3: Install Instaloader
    - name: Install Instaloader
      run: |
        python -m pip install --upgrade pip
        pip install instaloader

    # Step 4: Run the Scraper
    - name: Download Profile Media
      run: |
        # Base command for downloading a public profile
        # --no-captions and --no-metadata-json are added to save space, remove them if you want text data
        COMMAND="instaloader --no-captions --no-metadata-json"
        
        # Check if user wants reels included
        if [ "${{ inputs.download_reels }}" = "true" ]; then
          COMMAND="$COMMAND --reels --igtv"
        fi
        
        # Execute the download command targeting the input username
        $COMMAND "${{ inputs.target_username }}"

    # Step 5: Zip the downloaded content so it can be exported easily
    - name: Zip Downloaded Content
      run: |
        zip -r instagram_media.zip "${{ inputs.target_username }}"/

    # Step 6: Upload the files as a GitHub Artifact
    - name: Upload Media Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.target_username }}-instagram-backup
        path: instagram_media.zip
        retention-days: 5
