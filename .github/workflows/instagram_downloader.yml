name: Pro Instagram Downloader (Proxy Enabled)

on:
  workflow_dispatch:
    inputs:
      profile_link:
        description: 'Instagram Profile Link (e.g., https://www.instagram.com/akvenice_sw/)'
        required: true
        type: string

permissions:
  contents: write 

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Instaloader
      run: |
        python -m pip install --upgrade pip
        pip install instaloader

    - name: Extract Username
      id: extract
      run: |
        LINK="${{ inputs.profile_link }}"
        CLEAN_LINK=$(echo "$LINK" | awk -F'?' '{print $1}' | sed 's:/*$::')
        USERNAME=$(echo "$CLEAN_LINK" | awk -F'/' '{print $NF}')
        echo "USERNAME=$USERNAME" >> $GITHUB_ENV

    - name: Download Media via Residential Proxy
      env:
        # This securely pulls your proxy credentials from GitHub Secrets
        HTTP_PROXY: ${{ secrets.IG_PROXY_URL }}
        HTTPS_PROXY: ${{ secrets.IG_PROXY_URL }}
      run: |
        if [ -z "$HTTPS_PROXY" ]; then
          echo "ERROR: No proxy configured. Instagram will likely block this runner (403 Forbidden)."
          echo "Please add IG_PROXY_URL to your GitHub Repository Secrets."
          exit 1
        fi
        
        echo "Proxy detected. Initiating download for ${USERNAME}..."
        instaloader --no-captions --no-metadata-json --reels --igtv "${USERNAME}"

    - name: Commit and Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage the new directory
        git add "${USERNAME}/"
        
        # Check for changes and commit if files exist
        if git diff-index --quiet HEAD; then
          echo "No new media found to commit."
        else
          git commit -m "chore: auto-downloaded content for ${USERNAME}"
          git push origin HEAD
          echo "Successfully pushed new media to the repository."
        fi
