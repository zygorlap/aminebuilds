name: Instagram Posts Archiver

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Instagram username (without @)'
        required: true
        type: string

jobs:
  archive-posts:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install instagrapi pillow

      - name: Download Instagram posts
        id: download
        run: |
          python << 'EOF'
          import os
          import json
          from datetime import datetime
          from pathlib import Path
          from instagrapi import Client
          
          # Initialize client
          cl = Client()
          
          # Credentials from GitHub secrets
          username = "${{ github.event.inputs.username }}"
          ig_username = "${{ secrets.INSTAGRAM_USERNAME }}"
          ig_password = "${{ secrets.INSTAGRAM_PASSWORD }}"
          
          # Create archive directory
          archive_dir = Path("instagram_archive")
          archive_dir.mkdir(exist_ok=True)
          
          # Create user subdirectory
          user_dir = archive_dir / username
          user_dir.mkdir(exist_ok=True)
          
          # Create media directory
          media_dir = user_dir / "media"
          media_dir.mkdir(exist_ok=True)
          
          try:
              print(f"Logging in to Instagram as {ig_username}...")
              cl.login(ig_username, ig_password)
              
              print(f"Fetching posts from @{username}...")
              user = cl.user_info_by_username(username)
              user_id = user.pk
              
              # Get all posts
              medias = cl.user_medias(user_id)
              
              posts_data = []
              
              print(f"Found {len(medias)} posts. Downloading...")
              
              for idx, media in enumerate(medias, 1):
                  post_info = {
                      "id": media.id,
                      "caption": media.caption,
                      "timestamp": media.taken_at.isoformat() if media.taken_at else None,
                      "likes": media.like_count,
                      "comments": media.comment_count,
                      "media_type": media.media_type,
                      "url": media.link,
                      "media_files": []
                  }
                  
                  # Download images/videos
                  if media.media_type == 1:  # Photo
                      filename = f"post_{media.id}_photo.jpg"
                      filepath = media_dir / filename
                      
                      if not filepath.exists():
                          with open(filepath, 'wb') as f:
                              f.write(media.get_file().read())
                      
                      post_info["media_files"].append(filename)
                      print(f"[{idx}] Downloaded photo: {filename}")
                      
                  elif media.media_type == 2:  # Video
                      filename = f"post_{media.id}_video.mp4"
                      filepath = media_dir / filename
                      
                      if not filepath.exists():
                          with open(filepath, 'wb') as f:
                              f.write(media.get_file().read())
                      
                      post_info["media_files"].append(filename)
                      print(f"[{idx}] Downloaded video: {filename}")
                      
                  elif media.media_type == 8:  # Album (carousel)
                      for res_idx, resource in enumerate(media.resources, 1):
                          if resource.media_type == 1:
                              filename = f"post_{media.id}_carousel_{res_idx}.jpg"
                          else:
                              filename = f"post_{media.id}_carousel_{res_idx}.mp4"
                          
                          filepath = media_dir / filename
                          
                          if not filepath.exists():
                              with open(filepath, 'wb') as f:
                                  f.write(resource.get_file().read())
                          
                          post_info["media_files"].append(filename)
                      print(f"[{idx}] Downloaded carousel with {len(media.resources)} items")
                  
                  posts_data.append(post_info)
              
              # Save metadata as JSON
              metadata_file = user_dir / "posts_metadata.json"
              with open(metadata_file, 'w', encoding='utf-8') as f:
                  json.dump(posts_data, f, indent=2, ensure_ascii=False)
              
              print(f"\nâœ… Successfully archived {len(posts_data)} posts!")
              print(f"ðŸ“ Saved to: {user_dir}")
              
              # Set output for next step
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                  f.write(f"posts_count={len(posts_data)}\n")
                  f.write(f"user_dir={user_dir}\n")
              
          except Exception as e:
              print(f"âŒ Error: {str(e)}")
              raise
          finally:
              try:
                  cl.logout()
              except:
                  pass
          
          EOF

      - name: Create README
        run: |
          cat > instagram_archive/${{ github.event.inputs.username }}/README.md << 'EOF'
          # Instagram Archive: ${{ github.event.inputs.username }}
          
          **Archived on:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          **Total Posts:** ${{ steps.download.outputs.posts_count }}
          
          ## Contents
          - `media/` - Downloaded images and videos
          - `posts_metadata.json` - Post metadata (captions, likes, timestamps, etc.)
          
          ## File Structure
          ```
          instagram_archive/${{ github.event.inputs.username }}/
          â”œâ”€â”€ README.md
          â”œâ”€â”€ posts_metadata.json
          â””â”€â”€ media/
              â”œâ”€â”€ post_[id]_photo.jpg
              â”œâ”€â”€ post_[id]_video.mp4
              â””â”€â”€ ...
          ```
          
          ## Notes
          - This archive is created automatically by GitHub Actions
          - Please respect Instagram's Terms of Service
          - Images and videos are your own content
          
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git.config user.email "actions@github.com"
          
          git add instagram_archive/
          
          if git diff --quiet --cached; then
            echo "âœ… No new posts to commit"
          else
            git commit -m "Archive: Add Instagram posts from @${{ github.event.inputs.username }} on $(date -u +'%Y-%m-%d')"
            git push
            echo "âœ… Pushed to repository"
          fi

      - name: Workflow summary
        if: always()
        run: |
          echo "## ðŸ“¸ Instagram Archive Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Username:** @${{ github.event.inputs.username }}" >> $GITHUB_STEP_SUMMARY
          echo "**Posts Archived:** ${{ steps.download.outputs.posts_count }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** âœ… Complete" >> $GITHUB_STEP_SUMMARY
