name: Instagram Public Archiver

on:
  workflow_dispatch:
    inputs:
      target_username:
        description: "Public Instagram username (without @)"
        required: true
        default: "instagram"
        type: string
      max_posts:
        description: "Max posts to download (0 = ALL)"
        required: false
        default: "0"
        type: string
      download_videos:
        description: "Download videos and reels?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      download_reels:
        description: "Download reels separately?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      download_tagged:
        description: "Download posts you are tagged in?"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-instaloader-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install instaloader==4.13.1

      - name: Run archiver
        id: archiver
        env:
          TARGET: ${{ github.event.inputs.target_username }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
          DL_VIDEOS: ${{ github.event.inputs.download_videos }}
          DL_REELS: ${{ github.event.inputs.download_reels }}
          DL_TAGGED: ${{ github.event.inputs.download_tagged }}
        run: python archiver.py

      - name: Verify output
        run: |
          DIR="instagram_archive/${{ github.event.inputs.target_username }}"
          if [ ! -d "$DIR" ]; then
            echo "ERROR: Archive directory missing!"
            exit 1
          fi
          TOTAL=$(find "$DIR" -type f | wc -l)
          echo "Verification passed. Total files: $TOTAL"
          ls -lh "$DIR"

      - name: Commit and push
        run: |
          git config user.name "Instagram Archiver Bot"
          git config user.email "actions@github.com"
          git add instagram_archive/
          if git diff --quiet --cached; then
            echo "Nothing new to commit."
          else
            git commit -m "archive(@${{ github.event.inputs.target_username }}): $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload artifact (30-day backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ github.event.inputs.target_username }}-${{ github.run_id }}
          path: instagram_archive/
          retention-days: 30

      - name: Job summary
        if: always()
        run: |
          echo "## Instagram Archive — @${{ github.event.inputs.target_username }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Posts processed | ${{ steps.archiver.outputs.posts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Files saved | ${{ steps.archiver.outputs.files_saved }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | ${{ steps.archiver.outputs.errors }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | $(date -u +'%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output files" >> $GITHUB_STEP_SUMMARY
          echo "- \`gallery.html\` — browse your archive in any browser" >> $GITHUB_STEP_SUMMARY
          echo "- \`posts_metadata.json\` — captions, likes, timestamps, hashtags" >> $GITHUB_STEP_SUMMARY
          echo "- \`profile.json\` — profile snapshot" >> $GITHUB_STEP_SUMMARY
          echo "- \`media/\` — all images and videos" >> $GITHUB_STEP_SUMMARY
